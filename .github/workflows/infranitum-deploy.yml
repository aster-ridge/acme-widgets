# Infranitum deploy workflow.
#
# Triggers on merges to main that touch remediation CloudFormation under
# `infra/infranitum/` (not `_bootstrap/` — bootstrap is deployed manually once).
# Assumes `InfranitumDeployRole` via GitHub OIDC. For each template found, runs
# `aws cloudformation deploy` and tags the stack `ManagedBy=Infranitum`.
#
# Configure AFTER the bootstrap stack deploys (Settings → Variables):
#   INFRANITUM_DEPLOY_ROLE_ARN — DeployRoleArn from the bootstrap stack
#   INFRANITUM_AWS_REGION        — optional, default us-east-1

name: Infranitum Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'infra/infranitum/**'
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.INFRANITUM_AWS_REGION || 'us-east-1' }}
      DEPLOY_ROLE_ARN: ${{ vars.INFRANITUM_DEPLOY_ROLE_ARN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Discover Infranitum templates
        id: find
        run: |
          set -euo pipefail
          mapfile -t TEMPLATES < <(find infra/infranitum -type f \( -name '*.yaml' -o -name '*.yml' \) ! -path '*/_bootstrap/*' | sort)
          if [ "${#TEMPLATES[@]}" -eq 0 ]; then
            echo "::notice::No remediation templates under infra/infranitum/ (excluding _bootstrap). Nothing to deploy."
            echo "templates=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf "Found %d template(s):\n" "${#TEMPLATES[@]}"
          for t in "${TEMPLATES[@]}"; do echo "  $t"; done
          {
            echo "templates<<EOF"
            for t in "${TEMPLATES[@]}"; do echo "$t"; done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Require deploy role variable
        if: steps.find.outputs.templates != ''
        run: |
          set -euo pipefail
          if [ -z "$DEPLOY_ROLE_ARN" ]; then
            echo "::error::INFRANITUM_DEPLOY_ROLE_ARN is not set."
            echo ""
            echo "This workflow assumes InfranitumDeployRole via OIDC. Set it up in order:"
            echo "  1. Merge the bootstrap PR and deploy the bootstrap CloudFormation stack once"
            echo "     (aws cloudformation deploy — from your laptop with AWS CLI credentials)."
            echo "  2. Copy the stack output DeployRoleArn."
            echo "  3. Repo → Settings → Secrets and variables → Actions → Variables:"
            echo "       INFRANITUM_DEPLOY_ROLE_ARN = <DeployRoleArn>"
            echo "       INFRANITUM_AWS_REGION = us-east-1  (optional)"
            echo "  4. Re-run this workflow or merge a remediation PR."
            exit 1
          fi

      - name: Assume Infranitum deploy role via OIDC
        if: steps.find.outputs.templates != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.INFRANITUM_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: infranitum-deploy-${{ github.run_id }}

      - name: Validate every template
        if: steps.find.outputs.templates != ''
        run: |
          set -euo pipefail
          while IFS= read -r t; do
            [ -z "$t" ] && continue
            echo "::group::cfn validate-template — $t"
            aws cloudformation validate-template --template-body "file://$t" >/dev/null
            echo "::endgroup::"
          done <<< "${{ steps.find.outputs.templates }}"

      - name: Deploy each template
        if: steps.find.outputs.templates != ''
        run: |
          set -euo pipefail
          while IFS= read -r t; do
            [ -z "$t" ] && continue
            check_dir="$(basename "$(dirname "$t")")"
            stack="infranitum-$(echo "$check_dir" | tr '[:upper:]' '[:lower:]')"
            echo "::group::Deploy $t → $stack"
            status=$(aws cloudformation describe-stacks --stack-name "$stack" --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "MISSING")
            if [ "$status" = "ROLLBACK_COMPLETE" ]; then
              echo "Stack is ROLLBACK_COMPLETE (empty); deleting so a fresh CREATE can run."
              aws cloudformation delete-stack --stack-name "$stack"
              aws cloudformation wait stack-delete-complete --stack-name "$stack"
            fi
            aws cloudformation deploy \
              --template-file "$t" \
              --stack-name "$stack" \
              --capabilities CAPABILITY_NAMED_IAM \
              --no-fail-on-empty-changeset \
              --tags ManagedBy=Infranitum "infranitum:check-id=$check_dir" "infranitum:source=github-actions" "infranitum:run-id=${{ github.run_id }}"
            echo "::endgroup::"
          done <<< "${{ steps.find.outputs.templates }}"

      - name: Write run summary
        if: always() && steps.find.outputs.templates != ''
        run: |
          {
            echo "## Infranitum deploy summary"
            echo
            echo "Region: \`$AWS_REGION\`"
            echo "Run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo
            echo "Templates deployed:"
            while IFS= read -r t; do
              [ -z "$t" ] && continue
              check_dir="$(basename "$(dirname "$t")")"
              stack="infranitum-$(echo "$check_dir" | tr '[:upper:]' '[:lower:]')"
              echo "- \`$t\` → \`$stack\`"
            done <<< "${{ steps.find.outputs.templates }}"
          } >> "$GITHUB_STEP_SUMMARY"
